<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach CRM - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: rgba(26, 26, 26, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --font-inter: 'Inter', sans-serif;
            --glass-blur: blur(12px);
            --glow-accent: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-inter);
        }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at top left, #1a1e24 0%, var(--bg-base) 50%),
                              radial-gradient(circle at bottom right, #0d141c 0%, var(--bg-base) 50%);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background-color: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 24px;
            display: inline-block;
            text-shadow: var(--glow-accent);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background-color: #fff;
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background-color: #f1f5f9;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon">⚡</div>
        <h1>Outreach CRM</h1>
        <p>Your AI-powered lead generation and management engine. Please sign in to access your dashboard.</p>
        
        <button class="btn-google" onclick="login()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
        
        <div class="footer">Secure access via Firebase Auth</div>
    </div>

    <script type="module">
        import { initAuth, login } from './js/auth.js?v=2';
        
        // Expose to window for the button onclick
        window.login = login;
        
        // Initialize auth listener (false = do not enforce login, just listen for redirect)
        initAuth(false);
    </script>
</body>
</html>
